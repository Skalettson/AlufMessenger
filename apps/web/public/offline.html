<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aluf — Нет подключения</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f8fafc; color: #334155;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #e2e8f0; }
    }
    .container { text-align: center; padding: 2rem; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #64748b; margin-bottom: 1.5rem; }
    button {
      padding: 0.75rem 2rem; border: none; border-radius: 0.5rem;
      background: #0088CC; color: white; font-size: 1rem; cursor: pointer;
    }
    button:hover { background: #0077b6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Нет подключения к интернету</h1>
    <p>Проверьте подключение и попробуйте снова</p>
    <button onclick="location.reload()">Повторить</button>
  </div>
</body>
</html>
