syntax = "proto3";

package aluf.call.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

service CallService {
  rpc InitiateCall(InitiateCallRequest) returns (CallResponse);
  rpc JoinCall(JoinCallRequest) returns (CallResponse);
  rpc LeaveCall(LeaveCallRequest) returns (Empty);
  rpc EndCall(EndCallRequest) returns (Empty);
  rpc GetCall(GetCallRequest) returns (CallResponse);
  rpc GetCallToken(GetCallTokenRequest) returns (CallTokenResponse);
  rpc Signal(SignalRequest) returns (Empty);
  rpc BroadcastSignal(BroadcastSignalRequest) returns (Empty);
}

message Empty {}

enum CallType {
  CALL_TYPE_UNSPECIFIED = 0;
  CALL_TYPE_VOICE = 1;
  CALL_TYPE_VIDEO = 2;
}

enum CallStatus {
  CALL_STATUS_UNSPECIFIED = 0;
  CALL_STATUS_RINGING = 1;
  CALL_STATUS_ACTIVE = 2;
  CALL_STATUS_ENDED = 3;
  CALL_STATUS_MISSED = 4;
  CALL_STATUS_DECLINED = 5;
  CALL_STATUS_BUSY = 6;
  CALL_STATUS_FAILED = 7;
}

enum SignalType {
  SIGNAL_TYPE_UNSPECIFIED = 0;
  SIGNAL_TYPE_OFFER = 1;
  SIGNAL_TYPE_ANSWER = 2;
  SIGNAL_TYPE_ICE_CANDIDATE = 3;
  SIGNAL_TYPE_MUTE = 4;
  SIGNAL_TYPE_UNMUTE = 5;
  SIGNAL_TYPE_VIDEO_ON = 6;
  SIGNAL_TYPE_VIDEO_OFF = 7;
  SIGNAL_TYPE_SCREEN_SHARE_START = 8;
  SIGNAL_TYPE_SCREEN_SHARE_STOP = 9;
}

message InitiateCallRequest {
  string caller_id = 1;
  string chat_id = 2;
  CallType type = 3;
  repeated string participant_ids = 4;
}

message JoinCallRequest {
  string call_id = 1;
  string user_id = 2;
}

message LeaveCallRequest {
  string call_id = 1;
  string user_id = 2;
}

message EndCallRequest {
  string call_id = 1;
  string user_id = 2;
}

message GetCallRequest {
  string call_id = 1;
}

message GetCallTokenRequest {
  string call_id = 1;
  string user_id = 2;
  string username = 3;
  optional string display_name = 4;
}

message SignalRequest {
  string call_id = 1;
  string sender_id = 2;
  string recipient_id = 3;
  SignalType type = 4;
  string payload = 5;
  google.protobuf.Struct metadata = 6;
}

message BroadcastSignalRequest {
  string call_id = 1;
  string sender_id = 2;
  SignalType type = 3;
  string payload = 4;
  google.protobuf.Struct metadata = 5;
}

message CallParticipant {
  string user_id = 1;
  bool is_muted = 2;
  bool is_video_on = 3;
  bool is_screen_sharing = 4;
  google.protobuf.Timestamp joined_at = 5;
}

message CallResponse {
  string id = 1;
  string chat_id = 2;
  string caller_id = 3;
  CallType type = 4;
  CallStatus status = 5;
  repeated CallParticipant participants = 6;
  int32 duration_seconds = 7;
  google.protobuf.Timestamp started_at = 8;
  google.protobuf.Timestamp ended_at = 9;
  google.protobuf.Timestamp created_at = 10;
  string room_name = 11;
  /** Групповой/канальный звонок (совпадает с полем в БД). */
  bool is_group = 12;
}

message CallTokenResponse {
  string token = 1;
  string room_name = 2;
  string livekit_url = 3;
}
